apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frontend
  namespace: frontend
spec:
  interval: 5m0s
  releaseName: frontend
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: frontend
      version: "0.1.4"
      sourceRef:
        kind: HelmRepository
        name: frontend
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/andreistefanciprian/frontend
      tag: 1.1.2@sha256:9379274886c49e85bd53cb7ad91b03ae1badec73660a252b5576a2274af4984c
    config:
      LOG_LEVEL: DEBUG
      BACKEND_HOST: api-gateway.api-gateway.svc
