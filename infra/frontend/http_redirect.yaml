apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route-http
  namespace: frontend
spec:
  parentRefs:
    - name: urlshortener-gateway
      namespace: traefik-gateway
      sectionName: http-frontend
  hostnames:
    - app.${CLOUDFLARE_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301