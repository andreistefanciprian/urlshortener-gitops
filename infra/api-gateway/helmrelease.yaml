apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: api-gateway
  namespace: api-gateway
spec:
  interval: 5m0s
  releaseName: api-gateway
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: api-gateway
      version: "0.1.15"
      sourceRef:
        kind: HelmRepository
        name: api-gateway
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/andreistefanciprian/api-gateway
      tag: 1.0.8
    config:
      LOG_LEVEL: DEBUG
      DOMAIN_NAME: ${CLOUDFLARE_DOMAIN}
      URL_GEN_HOST: url-gen.url-gen.svc
      URL_READ_HOST: url-read.url-read.svc
