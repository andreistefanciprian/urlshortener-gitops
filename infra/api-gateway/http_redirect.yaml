apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-gateway-route-http
  namespace: api-gateway
spec:
  parentRefs:
    - name: urlshortener-gateway
      namespace: traefik-gateway
      sectionName: http-api-gateway
  hostnames:
    - ${CLOUDFLARE_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301