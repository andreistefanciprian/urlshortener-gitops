apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: postgres
spec:
  interval: 5m0s
  releaseName: pg
  chart:
    spec:
      chart: postgresql
      version: "15.5.14"
      sourceRef:
        kind: HelmRepository
        name: bitnami-charts
        namespace: flux-system
  values:
    image:
      tag: "latest"
      debug: true
    auth:
      enablePostgresUser: true
      username: url_gen_user
      replicationUsername: repl_user
      database: urls
      existingSecret: pg-creds
      secretKeys:
        adminPasswordKey: admin-password
        userPasswordKey: user-password
        replicationPasswordKey: replication-password
    primary:
      persistence:
        enabled: true
        size: 1Gi
      initdb:
        scriptsConfigMap: db-init-sql
