---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Flux System (Operator and Instance)
  - flux-system

  # Namespaces (must come first)
  - namespaces.yaml

  # Core Infrastructure
  - gateway-api-crds.yaml
  # - secrets-store-csi-driver.yaml
  - external-secrets.yaml
  - cert-manager.yaml
  - monitoring.yaml
  - external-dns.yaml

  # Applications
  - postgres.yaml
  - redis.yaml
  - url-gen.yaml
  - url-read.yaml

  # Ingress
  - traefik.yaml

  # Security & Policy
  - priorityclasses.yaml