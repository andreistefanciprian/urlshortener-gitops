apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: api-gateway
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infra/api-gateway
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: url-gen
    - name: url-read
